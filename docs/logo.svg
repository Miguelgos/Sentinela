<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" rx="10" fill="#0f172a"/>

  <!-- Shield shape -->
  <path d="M 50 18 L 72 22 L 72 50 Q 72 68 50 76 Q 28 68 28 50 L 28 22 Z"
        fill="url(#shieldGrad)" opacity="0.95"/>

  <!-- Shield inner highlight -->
  <path d="M 50 22 L 68 26 L 68 50 Q 68 64 50 72 Q 32 64 32 50 L 32 26 Z"
        fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.4"/>

  <!-- Eye inside shield -->
  <!-- Outer eye outline -->
  <ellipse cx="50" cy="47" rx="12" ry="7.5" fill="none" stroke="#bfdbfe" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Iris -->
  <circle cx="50" cy="47" r="5" fill="#1d4ed8"/>
  <!-- Pupil -->
  <circle cx="50" cy="47" r="2.8" fill="#0f172a"/>
  <!-- Glint -->
  <circle cx="52" cy="45" r="1" fill="#93c5fd" opacity="0.9"/>
  <!-- Eye lashes top -->
  <path d="M 38 43 Q 50 36 62 43" fill="none" stroke="#bfdbfe" stroke-width="1" opacity="0.5"/>
  <!-- Eye lashes bottom -->
  <path d="M 38 51 Q 50 58 62 51" fill="none" stroke="#bfdbfe" stroke-width="1" opacity="0.5"/>

  <!-- Scan line (horizontal) -->
  <line x1="28" y1="47" x2="72" y2="47" stroke="#60a5fa" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.35"/>

  <!-- Signal dots (pulse) -->
  <circle cx="80" cy="47" r="2.5" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="80" cy="47" r="5" fill="none" stroke="#1d4ed8" stroke-width="0.8" opacity="0.4"/>
  <circle cx="80" cy="47" r="8" fill="none" stroke="#1d4ed8" stroke-width="0.5" opacity="0.2"/>

  <!-- Wordmark: SENTINELA -->
  <text x="100" y="52"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="2"
        fill="#f1f5f9">SENTINELA</text>

  <!-- Tagline -->
  <text x="101" y="67"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="9.5"
        font-weight="400"
        letter-spacing="3.5"
        fill="#64748b">LOG INTELLIGENCE · ITURAN</text>

  <!-- Subtle top edge glow -->
  <rect x="10" y="10" width="300" height="30" rx="6" fill="url(#glowGrad)" opacity="0.6"/>
</svg>
