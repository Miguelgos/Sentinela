<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="sh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Shield -->
  <path d="M 32 10 L 52 15 L 52 36 Q 52 54 32 60 Q 12 54 12 36 L 12 15 Z"
        fill="url(#sh)" opacity="0.95"/>

  <!-- Shield border -->
  <path d="M 32 13 L 49 17.5 L 49 36 Q 49 51 32 57 Q 15 51 15 36 L 15 17.5 Z"
        fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.35"/>

  <!-- Eye -->
  <ellipse cx="32" cy="35" rx="13" ry="8" fill="none" stroke="#bfdbfe" stroke-width="1.5"/>
  <circle cx="32" cy="35" r="5.5" fill="#1e3a8a"/>
  <circle cx="32" cy="35" r="3" fill="#0f172a"/>
  <circle cx="34" cy="33" r="1.2" fill="#93c5fd" opacity="0.95"/>

  <!-- Top arc (lashes) -->
  <path d="M 19 31 Q 32 22 45 31" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>
  <path d="M 19 39 Q 32 48 45 39" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>

  <!-- Scan line -->
  <line x1="12" y1="35" x2="52" y2="35" stroke="#60a5fa" stroke-width="0.6" stroke-dasharray="2 4" opacity="0.3"/>
</svg>
